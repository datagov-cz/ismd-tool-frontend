name: CodeQL

# GitHub-native SAST. Analyzes JavaScript/TypeScript source for vulnerabilities
# (XSS, path traversal, unsafe deserialization, etc.). Free for public repos.
# Findings appear in Security -> Code scanning.

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  schedule:
    - cron: '0 6 * * 1'   # Weekly Monday 06:00 UTC

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Skip analysis on branches with no JS/TS sources (e.g. empty main before
      # initial import). Without this guard, codeql-action/analyze fails with
      # exit 32: "no source code seen during build".
      - name: Detect JS/TS sources
        id: detect
        run: |
          if find . -type d \( -name node_modules -o -name .git \) -prune -o \
                    -type f \( -name '*.js' -o -name '*.jsx' \
                            -o -name '*.ts' -o -name '*.tsx' \
                            -o -name '*.mjs' -o -name '*.cjs' \) -print \
               | grep -q .; then
            echo "has_sources=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_sources=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No JS/TS sources found — skipping CodeQL analysis."
          fi

      - name: Initialize CodeQL
        if: steps.detect.outputs.has_sources == 'true'
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Perform CodeQL Analysis
        if: steps.detect.outputs.has_sources == 'true'
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"

name: Trivy Image Scan

# Calls the reusable Trivy scanner owned by infrastructure repo.
# Findings appear in this repo's Security -> Code scanning tab.
#
# Image taxonomy (see reusable-docker-build.yml):
#   dev branch  -> ghcr.io/datagov-cz/ismd-tool-frontend-dev:latest    (deployed to dev env)
#   main branch -> ghcr.io/datagov-cz/ismd-tool-frontend:latest        (deployed to test + prod)
#
# Triggers:
#   * After "Build Dev Branch"  completes -> scan dev image
#   * After "Build Docker on Main" completes -> scan main image
#   * Weekly Monday 07:00 UTC               -> scan BOTH (CVE-feed drift)
#   * Manual dispatch                        -> pick dev/main/both

on:
  workflow_run:
    workflows: ["Build Dev Branch", "Build Docker on Main"]
    types: [completed]
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      image_variant:
        description: 'Which image(s) to scan'
        required: true
        type: choice
        options: [dev, main, both]
        default: both
      soft_fail:
        description: 'Non-blocking: workflow stays green even if findings exist (default). Uncheck to make scan blocking for this run.'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: read
  security-events: write

jobs:
  # Cheap existence check so cron / manual dispatch don't fail on branches
  # that have never been built (e.g. empty main before initial import).
  # workflow_run triggers are already guaranteed-safe but pay the check too.
  check-images:
    name: Check which images exist
    runs-on: ubuntu-latest
    outputs:
      dev_exists: ${{ steps.dev.outputs.exists }}
      main_exists: ${{ steps.main.outputs.exists }}
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Check dev image
        id: dev
        run: |
          if docker buildx imagetools inspect ghcr.io/datagov-cz/ismd-tool-frontend-dev:latest >/dev/null 2>&1; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::dev image not found — skipping dev scan."
          fi
      - name: Check main image
        id: main
        run: |
          if docker buildx imagetools inspect ghcr.io/datagov-cz/ismd-tool-frontend:latest >/dev/null 2>&1; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::main image not found — skipping main scan."
          fi

  scan-dev:
    name: Scan dev image
    needs: check-images
    if: |
      needs.check-images.outputs.dev_exists == 'true' && (
        (github.event_name == 'workflow_run' && github.event.workflow_run.name == 'Build Dev Branch' && github.event.workflow_run.conclusion == 'success') ||
        github.event_name == 'schedule' ||
        (github.event_name == 'workflow_dispatch' && (inputs.image_variant == 'dev' || inputs.image_variant == 'both'))
      )
    uses: datagov-cz/ismd-infrastructure/.github/workflows/trivy-reusable.yml@dev
    with:
      image_ref: ghcr.io/datagov-cz/ismd-tool-frontend-dev:latest
      # Default non-blocking. Only a manual dispatch with soft_fail=false flips it.
      soft_fail: ${{ !(github.event_name == 'workflow_dispatch' && inputs.soft_fail == false) }}
    secrets: inherit

  scan-main:
    name: Scan main image
    needs: check-images
    if: |
      needs.check-images.outputs.main_exists == 'true' && (
        (github.event_name == 'workflow_run' && github.event.workflow_run.name == 'Build Docker on Main' && github.event.workflow_run.conclusion == 'success') ||
        github.event_name == 'schedule' ||
        (github.event_name == 'workflow_dispatch' && (inputs.image_variant == 'main' || inputs.image_variant == 'both'))
      )
    uses: datagov-cz/ismd-infrastructure/.github/workflows/trivy-reusable.yml@dev
    with:
      image_ref: ghcr.io/datagov-cz/ismd-tool-frontend:latest
      soft_fail: ${{ !(github.event_name == 'workflow_dispatch' && inputs.soft_fail == false) }}
    secrets: inherit

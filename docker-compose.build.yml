# Build override for tool frontend.
# Usage: docker compose -f docker-compose.yml -f docker-compose.build.yml up --build

services:
  ismd-tool-frontend:
    image: ismd-tool-frontend:local
    pull_policy: never
    build:
      context: .
      args:
        NODE_ENV: ${NODE_ENV:-development}
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-/popisujeme}
